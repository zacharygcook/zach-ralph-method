name: Propose agent-skills sync

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-ralph-suite
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.AGENT_SKILLS_SYNC_TOKEN }}
      SKILL_NAMES: ralph-loop ralph-sprint ralph-status ralph-review
    steps:
      - name: Require cross-repository token
        run: test -n "$GH_TOKEN"

      - name: Check out canonical source
        uses: actions/checkout@v4
        with:
          path: canonical
          fetch-depth: 0

      - name: Check out agent-skills
        uses: actions/checkout@v4
        with:
          repository: zacharygcook/agent-skills
          token: ${{ secrets.AGENT_SKILLS_SYNC_TOKEN }}
          path: collection
          fetch-depth: 0

      - name: Export canonical package
        run: |
          for skill in $SKILL_NAMES; do
            python3 collection/scripts/sync_flagship_skills.py update --skill "$skill" --source-root "canonical/skills/$skill" --apply
          done
          python3 collection/scripts/sync_flagship_skills.py remove --skill ralph-workflows --apply

      - name: Validate generated collection state
        working-directory: collection
        run: |
          python3 scripts/build_inventory.py
          python3 scripts/validate_skills.py
          python3 scripts/sync_flagship_skills.py check

      - name: Open synchronization pull request
        working-directory: collection
        run: |
          if git diff --quiet -- skills/ralph-loop skills/ralph-sprint skills/ralph-status skills/ralph-review flagship-skills.lock.json inventory/skills.json; then
            echo "Collection is already current."
            exit 0
          fi
          short_sha="${GITHUB_SHA::12}"
          branch="automation/sync-ralph-suite-${short_sha}"
          git config user.name "flagship-skill-sync"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$branch"
          git add skills/ralph-loop skills/ralph-sprint skills/ralph-status skills/ralph-review flagship-skills.lock.json inventory/skills.json
          git commit -m "Sync Ralph skill suite from canonical ${short_sha}"
          git push origin "$branch"
          gh pr create --repo zacharygcook/agent-skills --base master --head "$branch" --title "Sync Ralph skill suite ${short_sha}" --body "Automated deterministic export of \`ralph-loop\`, \`ralph-sprint\`, \`ralph-status\`, and \`ralph-review\` from the canonical repository at \`${GITHUB_SHA}\`. This also retires the generated \`ralph-workflows\` package. Collection CI verifies every locked package byte-for-byte."
