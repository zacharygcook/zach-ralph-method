name: Validate runtime

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install jq on macOS
        if: runner.os == 'macOS'
        run: brew install jq
      - name: Validate Python
        run: python -m compileall -q scripts tests templates/shared
      - name: Run clean-room tests
        run: python -m unittest discover -s tests -v
